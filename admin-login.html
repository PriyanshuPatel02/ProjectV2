<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — ShopXpress</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1>Admin Portal</h1>
    <p class="subtitle">Sign in to manage the platform</p>

    <div id="login-error" class="alert alert-danger hidden"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label>User ID</label>
        <input class="form-control" id="userId" placeholder="Admin User ID" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" id="password" type="password" placeholder="Admin password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">Sign In →</button>
    </form>

    <p class="center mt-2 text-muted"><a href="index.html">← Customer Login</a></p>

    <div style="margin-top:1.5rem;padding:1rem;background:rgba(240,165,0,.06);border-radius:var(--radius);border:1px solid rgba(240,165,0,.2)">
      <p class="text-muted" style="font-size:.8rem"><strong style="color:var(--accent)">Default Admin Credentials</strong><br>
      User ID: <code style="color:var(--text)">ADMIN001</code><br>
      Password: <code style="color:var(--text)">admin@12345</code></p>
    </div>
  </div>
</div>

<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
const sess = Store.getSession();
if (sess?.role === 'admin') window.location.href = 'admin-home.html';

document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');

  const id  = document.getElementById('userId').value.trim();
  const pwd = document.getElementById('password').value;

  if (!id || !pwd) {
    errEl.textContent = '⚠️ Please enter User ID and Password.';
    return errEl.classList.remove('hidden');
  }

  const admin = Store.getAdmin();
  if (id !== admin.userId || pwd !== admin.password) {
    errEl.textContent = '⚠️ Invalid user Id / Password.';
    return errEl.classList.remove('hidden');
  }

  Store.setSession({ role:'admin', userId: admin.userId, name: admin.name });
  window.location.href = 'admin-home.html';
});

function togglePassword() {
  const input = document.getElementById('password');
  const btn = document.getElementById('toggle-password');
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
  btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
}

renderSiteFooter();
</script>
</body>
</html>

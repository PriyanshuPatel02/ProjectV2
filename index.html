<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — ShopXpress</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue shopping</p>

    <div id="login-error" class="alert alert-danger hidden"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label>Customer ID</label>
        <input class="form-control" id="customerId" placeholder="Enter your username/customer id" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pwd-wrap">
          <input class="form-control" id="password" type="password" placeholder="Your password" required>
          <button type="button" class="pwd-toggle" id="toggle-password" aria-label="Show password" onclick="togglePassword()">👁</button>
        </div>
        <div class="flex justify-between mt-1">
          <span></span>
          <a href="forgot-password.html" style="font-size:.8rem;color:var(--muted)">Forgot password?</a>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">Sign In →</button>
    </form>

    <div class="divider"></div>
    <p class="center text-muted">New customer? <a href="register.html">Create Account</a></p>
    <p class="center text-muted mt-1">Admin? <a href="admin-login.html">Admin Login</a></p>

    <!-- <div style="margin-top:1.5rem;padding:1rem;background:rgba(240,165,0,.06);border-radius:var(--radius);border:1px solid rgba(240,165,0,.2)">
      <p class="text-muted" style="font-size:.8rem"><strong style="color:var(--accent)">Demo Credentials</strong><br>
      Customer ID: <code style="color:var(--text)">CUST0001</code><br>
      Password: <code style="color:var(--text)">demo@12345</code><br>
      Security answer: <code style="color:var(--text)">indore</code> (for password reset)</p>
    </div> -->
  </div>
</div>

<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
// Redirect if already logged in
const sess = Store.getSession();
if (sess?.role === 'customer') window.location.href = 'home.html';
if (sess?.role === 'admin') window.location.href = 'admin-home.html';

document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');

  const id  = document.getElementById('customerId').value.trim();
  const pwd = document.getElementById('password').value;

  if (!id || !pwd) {
    errEl.textContent = '⚠️ Please enter Customer ID and Password.';
    return errEl.classList.remove('hidden');
  }

  const customer = Store.getCustomerById(id);
  if (!customer || atob(customer.password) !== pwd) {
    errEl.textContent = '⚠️ Invalid Customer Id / Password.';
    document.getElementById("password").value = '';
    return errEl.classList.remove('hidden');
  }

  Store.setSession({ role:'customer', customerId: customer.customerId, name: customer.name });
  window.location.href = 'home.html';
});

function togglePassword() {
  const input = document.getElementById('password');
  const btn = document.getElementById('toggle-password');
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
  btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
}
</script>
</body>
</html>
